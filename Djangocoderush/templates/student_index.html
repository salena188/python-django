<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student page</title>
      <style>
          body {
                font-family: Arial, sans-serif;
                margin: 20px;
                background-color: #f4f4f4;
              }

              h2 {
                color: #333;
              }

              button {
                padding: 8px 15px;
                background-color: #544caf;
                color: white;
                border: none;
                cursor: pointer;
                margin-bottom: 20px;
              }

              button:hover {
                background-color: #1e2a6e;
              }

              form {
                background: white;
                padding: 15px;
                margin-bottom: 20px;
                border-radius: 5px;
                width: 300px;
              }

              input {
                width: 100%;
                padding: 8px;
                margin: 5px 0;
                box-sizing: border-box;
              }

              table {
                width: 100%;
                border-collapse: collapse;
                background: white;
              }

              table,
              th,
              td {
                border: 1px solid #ddd;
              }

              th,
              td {
                padding: 10px;
                text-align: left;
              }

              th {
                background-color: #544caf;
                color: white;
              }
  </style>
</head>
<body>
     <h2>Student Management</h2>

      <button>Add Student</button>

      <form>
        <h3>Student Form</h3>
        <input type="text" placeholder="Student Name">
        <input type="number" placeholder="Age">
        <input type="text" placeholder="Roll">
        <input type="text" placeholder="Address">
        <button type="submit">Submit</button>
      </form>

      <h3>Student List</h3>

      <table>
        <tr>
          <th>Student Name</th>
          <th>Age</th>
          <th>Roll</th>
          <th>Address</th>
        </tr>

        <tr>
          <td>Ram Sharma</td>
          <td>20</td>
          <td>101</td>
          <td>Kathmandu</td>
        </tr>

        <tr>
          <td>Sita Rai</td>
          <td>21</td>
          <td>102</td>
          <td>Lalitpur</td>
        </tr>
      </table>
</body>
</html>
